services:
  - type: web
    name: brandguard-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: brandguard-db
          property: connectionString
      - key: NEWS_API_KEY
        sync: false
      - key: SERPAPI_API_KEY
        sync: false

databases:
  - name: brandguard-db
    databaseName: brand_monitoring
    user: brandguard_user
